name: Backend Smoke Tests

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    paths:
      - "backend-python/**"
      - ".github/workflows/backend-smoke.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "backend-python/**"
      - ".github/workflows/backend-smoke.yml"

jobs:
  backend-smoke:
    name: Python backend smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend-python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run backend tests
        env:
          OPENAI_API_KEY: test-key
          OPENAI_BASE_URL: https://example.invalid/v1
          OPENAI_MODEL: gpt-4o-mini
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
          DATABASE_URL: sqlite+aiosqlite:///./travel_agent_test.db
          REDIS_URL: redis://localhost:6379/0
          MILVUS_HOST: localhost
          MILVUS_PORT: "19530"
          ENABLE_MEMORY_VECTOR_STORE: "true"
          ENABLE_LOCAL_EMBEDDINGS_FALLBACK: "true"
        run: python -m pytest -q
